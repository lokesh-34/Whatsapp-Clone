# WhatsApp Clone - Public Deployment Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  mongodb:
    image: mongo:latest
    container_name: whatsapp_db_prod
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: lokesh3328/whatsapp-backend:latest
    container_name: whatsapp_backend_prod
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/whatsapp_clone
      - PORT=5000
      - NODE_ENV=production
      # --- REQUIRED SECRETS (User must provide these) ---
      - JWT_SECRET=${JWT_SECRET}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
    depends_on:
      - mongodb

  frontend:
    image: lokesh3328/whatsapp-frontend:latest
    container_name: whatsapp_frontend_prod
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://your-domain.com:5000 # Update this to your public IP/Domain
    depends_on:
      - backend

volumes:
  mongodb_data:
